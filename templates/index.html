<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatSpark ⚡</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #00C9A7;
      --coral:       #FF6B6B;
      --amber:       #FFB347;
      --purple:      #A78BFA;
      --pink:        #F472B6;
      --green:       #4ADE80;
      --dark:        #0f0f1a;
      --card:        #1a1a2e;
      --card-light:  #16213e;
      --text:        #f0f0f0;
      --muted:       #888;
      --radius:      14px;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--teal), var(--purple));
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 20px rgba(0,201,167,0.3);
    }

    header .logo {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header .logo span { color: var(--amber); }

    .online-dot {
      width: 10px; height: 10px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      margin-left: auto;
    }

    .online-label {
      font-size: 0.8rem;
      color: var(--green);
      font-weight: 600;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    /* ── Name Entry Modal ── */
    #name-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal-box {
      background: var(--card);
      border: 1px solid var(--teal);
      border-radius: 20px;
      padding: 40px 36px;
      width: 340px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,201,167,0.2);
    }

    .modal-box h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--teal), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }

    .modal-box input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid var(--purple);
      background: var(--dark);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .modal-box input:focus { border-color: var(--teal); }

    .modal-box button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--teal), var(--purple));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .modal-box button:hover  { opacity: 0.9; }
    .modal-box button:active { transform: scale(0.98); }

    /* ── Chat Layout ── */
    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 16px 0;
      overflow: hidden;
    }

    /* ── Messages Area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
      padding-bottom: 8px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }

    /* ── History Divider ── */
    .history-divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 8px 0;
      border-bottom: 1px dashed #333;
      margin-bottom: 8px;
    }

    /* ── Message Bubble ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.mine  { align-self: flex-end;  align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }

    .msg .meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .msg .meta .name {
      font-weight: 700;
      font-size: 0.78rem;
    }

    .msg.mine  .meta .name { color: var(--teal); }
    .msg.other .meta .name { color: var(--coral); }

    .bubble {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.mine  .bubble {
      background: linear-gradient(135deg, var(--teal), var(--purple));
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.other .bubble {
      background: var(--card-light);
      border: 1px solid #333;
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* ── Typing Indicator ── */
    #typing-indicator {
      font-size: 0.8rem;
      color: var(--amber);
      padding: 4px 0 8px;
      min-height: 24px;
      font-style: italic;
    }

    /* ── Input Bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 12px 0 16px;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      padding: 13px 18px;
      border-radius: 30px;
      border: 2px solid #333;
      background: var(--card);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: var(--teal); }

    #send-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover  { opacity: 0.9; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }

    /* ── System messages ── */
    .sys-msg {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 4px;
    }
  </style>
</head>
<body>

<!-- Name Modal -->
<div id="name-modal">
  <div class="modal-box">
    <h2>⚡ Welcome to ChatSpark</h2>
    <p>Enter a username to jump in</p>
    <input type="text" id="username-input" placeholder="Your name..." maxlength="20" />
    <button onclick="joinChat()">Start Chatting →</button>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">Chat<span>Spark</span> ⚡</div>
  <div class="online-label">Live</div>
  <div class="online-dot"></div>
</header>

<!-- Chat -->
<div class="chat-wrapper">
  <div id="messages">
    {% if history %}
      <div class="history-divider">── Previous messages ──</div>
      {% for username, message, timestamp in history %}
        <div class="msg other">
          <div class="meta">
            <span class="name">{{ username }}</span>
            <span>{{ timestamp }}</span>
          </div>
          <div class="bubble">{{ message }}</div>
        </div>
      {% endfor %}
      <div class="history-divider">── Live ──</div>
    {% endif %}
  </div>

  <div id="typing-indicator"></div>

  <div class="input-bar">
    <input type="text" id="msg-input" placeholder="Type a message..." maxlength="500" disabled />
    <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<script>
  const socket = io();
  let myUsername = '';
  let typingTimer;

  // ── Join Chat ──────────────────────────────────────────────
  function joinChat() {
    const input = document.getElementById('username-input');
    const name  = input.value.trim();
    if (!name) { input.focus(); return; }

    myUsername = name;
    document.getElementById('name-modal').style.display = 'none';
    document.getElementById('msg-input').disabled  = false;
    document.getElementById('send-btn').disabled   = false;
    document.getElementById('msg-input').focus();

    appendSystemMsg(`You joined as ${myUsername} 👋`);
  }

  // ── Send Message ───────────────────────────────────────────
  function sendMessage() {
    const input   = document.getElementById('msg-input');
    const message = input.value.trim();
    if (!message || !myUsername) return;

    socket.emit('send_message', { username: myUsername, message });
    input.value = '';
    socket.emit('stop_typing');
    clearTimeout(typingTimer);
  }

  // ── Typing Indicator ───────────────────────────────────────
  document.getElementById('msg-input').addEventListener('input', () => {
    socket.emit('typing', { username: myUsername });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => socket.emit('stop_typing'), 1500);
  });

  // ── Enter Key ─────────────────────────────────────────────
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });

  // ── Receive Message ────────────────────────────────────────
  socket.on('receive_message', data => {
    const isMine = data.username === myUsername;
    appendMessage(data.username, data.message, data.timestamp, isMine);
  });

  // ── Typing Events ──────────────────────────────────────────
  socket.on('user_typing', data => {
    document.getElementById('typing-indicator').textContent =
      `${data.username} is typing...`;
  });

  socket.on('user_stopped_typing', () => {
    document.getElementById('typing-indicator').textContent = '';
  });

  // ── Helpers ────────────────────────────────────────────────
  function appendMessage(username, message, timestamp, isMine) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${isMine ? 'mine' : 'other'}`;
    div.innerHTML = `
      <div class="meta">
        <span class="name">${escHtml(username)}</span>
        <span>${escHtml(timestamp)}</span>
      </div>
      <div class="bubble">${escHtml(message)}</div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function appendSystemMsg(text) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Scroll to bottom on load
  window.addEventListener('load', () => {
    const box = document.getElementById('messages');
    box.scrollTop = box.scrollHeight;
  });
</script>
</body>
</html>
